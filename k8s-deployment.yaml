---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: mynginx-deploy
  labels:
    app: mynginx
spec:
  replicas: 3
  selector:
      matchLabels:
         app: mynginx
  template:
     metadata:
       labels:
         app: mynginx
     spec:
       containers:
       - name: mynginx-container
         image:  nginx
         ports:
         - containerPort: 80

---

apiVersion: v1
kind: Service
metadata:
   name: mynginx-svc
   labels:
     app: mynginx

spec:
  type: LoadBalancer
  ports:
  - port: 80
    nodePort: 30001
    protocol: TCP
  selector:
     app: mynginx
